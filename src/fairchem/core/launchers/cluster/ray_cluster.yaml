# Default configuration for SLURM Ray clusters
# These can be overridden by passing arguments to get_slurm_ray_cluster()

# SLURM settings
partition: scavenge
time_minutes: 4320
cpus_per_node: 10
gpus_per_node: 0
mem_gb: 32

# SLURM constraint (e.g., GPU type like "volta32gb")
# Set to null/empty for no constraint
slurm_constraint: null

# Additional SLURM parameters passed to submitit (for future flexibility)
# These are passed directly to the SLURM executor
# Example: {"slurm_account": "myaccount", "slurm_qos": "high"}
slurm_additional_parameters: {}

# Cluster settings
num_workers: 1
worker_wait_timeout_seconds: 300

# Environment variables set on workers via runtime_env
env_vars:
  OMP_NUM_THREADS: "1"
  MKL_NUM_THREADS: "1"
  OPENBLAS_NUM_THREADS: "1"
  NUMEXPR_NUM_THREADS: "1"
  RAY_raylet_start_wait_time_s: "300"
  RAY_SERVE_THROUGHPUT_OPTIMIZED: "1"
  RAY_SERVE_QUEUE_LENGTH_RESPONSE_DEADLINE_S: "1"

# Job exclusions (nodes to skip)
exclude_nodes: []

# Inference server settings
start_inference_server: false
# Log level for Ray Serve inference server (DEBUG, INFO, WARNING, ERROR, CRITICAL)
serve_log_level: WARNING

# Deployment configuration for Ray Serve
# These settings are passed directly to @serve.deployment()
# max_replicas is set automatically from num_workers
# max_ongoing_requests and logging_config are computed at runtime
deployment_config:
  autoscaling_config:
    target_ongoing_requests: 3
    downscale_delay_s: 300
    upscale_delay_s: 5
    max_replicas: 1.0 # max number of replicas, or if float the multiplier for num_workers to get max_replicas
    min_replicas: 1.0 # min number of replicas, or if float the fraction of max_replicas to use as minimum
  num_replicas: "auto"
  max_ongoing_requests: 327680 # 5*max_batch_size*max_concurrent_batches
  ray_actor_options:
    num_gpus: 1
    num_cpus: 2
  graceful_shutdown_timeout_s: 60

# Batch configuration for inference
# Controls how inference requests are batched together
batch_config:
  max_batch_size: 8192  # Max atoms in a batch
  batch_wait_timeout_s: 0.1  # Max time to wait for batch to fill
  max_concurrent_batches: 8  # Max concurrent batches per replica

temp_dir_template: '/scratch/slurm_tmpdir/$SLURM_JOB_ID'