# FastCSP Configuration Example (exhaustive)
#
# This file lists every flag the workflow honours. Defaults are noted in
# comments; flags marked "(optional)" can be omitted. Feel free to delete
# sections you do not need - only `root` and `molecules` are strictly
# required, and only the stages you pass to ``--stages`` need their own
# section.

root: /path/to/project/directory   # base directory for all outputs

# Input molecules CSV. Required columns: name, conformers_path.
# Optional columns: z, spg, refcode, cif_path (see top-level README).
molecules: configs/example_systems.csv

# ---------------------------------------------------------------------------
# Stage 1: Genarris structure generation
# ---------------------------------------------------------------------------
genarris:
  # Execution environment
  mpi_launcher: /path/to/mpirun                       # MPI launcher: mpirun, srun, or custom path
  python_cmd: /path/to/python/with/genarris/installed # Python interpreter with Genarris installed
  genarris_cli: /path/to/genarris_cli.py              # Path to Genarris cli script
  genarris_base_config: configs/gnrs_base.conf        # Base Genarris configuration template
  # Structure generation parameters
  vars:
    Z: [1, 2, 3, 4, 6, 8]            # default [1]; ignored when read_z_from_file=true
    spg_distribution_type: standard  # "standard" (all compatible space groups) OR list[int]
                                     # of space-group numbers OR list[list[int]] (one per Z).
    num_structures_per_spg: 500      # default 500
    read_z_from_file: false          # read per-molecule Z from molecules.csv ("z" col)
    read_spg_from_file: false        # read per-molecule spg from molecules.csv ("spg" col)
  slurm:                             # Genarris SLURM job settings
    job-name: genarris               # default "genarris"
    nodes: 1                         # default 1
    ntasks-per-node: 40              # default 1
    time: 10800                      # minutes; default 7200
    # mem_gb: 200                    # (optional)
    # cpus_per_task: 40              # (optional)

# ---------------------------------------------------------------------------
# Stage 2: Pre-relaxation deduplication of Genarris outputs
# ---------------------------------------------------------------------------
# Bin key = (mol_id) + any of conf_id / Z / spg / binned-density that you
# enable. Larger keys -> smaller buckets -> faster dedup but higher risk of
# missing duplicates that fall across bin edges.
pre_relaxation_filter:
  assign_groups: true        # run dedup blocker + assign group_index. Default false
  remove_duplicates: true    # drop all-but-one per group (representative = closest
                             # to the group-median density_generated). Default false
  # StructureMatcher tolerances (looser than post-relax)
  ltol: 0.3                  # lattice tolerance.  Default 0.2
  stol: 0.4                  # site tolerance (Å). Default 0.3
  angle_tol: 5               # angle tolerance (deg). Default 5
  # Bin key extensions (all default false -> single (mol_id) bucket)
  bin_by_conf: false         # add conf_id to the dedup bin key
  bin_by_z: false            # add Z to the dedup bin key
  bin_by_spg: false          # add spg_generated to the dedup bin key
  density_bin_size: 0.02     # density blocker bin (g/cc); null disables binning
  # Cheap pairwise prefilters (skip sm.fit for obviously-different pairs)
  density_tol: null          # |Δρ| prefilter (g/cc); null disables it; off by default
  apply_niggli_filter: false # Niggli (a,b,c,α,β,γ) prefilter; most reliable when
                             # both bin_by_z and bin_by_spg are true
  # Output partitioning
  npartitions: 1000          # number of parquet partitions / SLURM array size
  slurm:                     # (optional)
    job-name: process_genarris_outputs
    cpus_per_task: 80
    mem_gb: 400
    time: 1000

# ---------------------------------------------------------------------------
# Stage 3: ML relaxation
# ---------------------------------------------------------------------------
relax:
  calculator: uma_sm_1p1_omc  # one of the keys in CHECKPOINTS in relax.py
                              # (e.g. uma_sm_1p1_omc, uma_sm_1p1_omol,
                              # uma_sm_1p2_omc, uma_sm_1p2_omol). RECOMMENDED: omc.
  optimizer: BFGS            # optimization algorithm (BFGS, FIRE, ...)
  fmax: 0.01                 # force convergence criterion (eV/Å). Default 0.01
  max_steps: 1000            # max optimization steps. Default 1000
  fix_symmetry: false        # preserve crystal symmetry during relax. Default false
  relax_cell: true           # allow unit cell relaxation. Default true
  write_traj: true           # write ASE trajectory files. Default false
  traj_interval: 1           # interval (steps) between trajectory frames. Default 1
  slurm:
    num_ranks: 1000          # number of independent relaxation tasks
    # job-name: relax        # default "relax"
    # gpus_per_node: 1       # default 1
    # cpus_per_task: 10      # default 10
    # mem_gb: 50             # default 50
    # time: 1000             # default 1000

# ---------------------------------------------------------------------------
# Stage 4: Post-relaxation filtering + deduplication
# ---------------------------------------------------------------------------
post_relaxation_filter:
  # Property-based filtering
  remove_problematic: true     # drop non-converged or connectivity-changed structures.
                               # Default false (kept and tagged with group_index=-1)
  energy_cutoff: 20            # kJ/mol above the global minimum; null disables
  density_min_cutoff: 0.5      # g/cm³ lower bound on relaxed density; null disables
  density_max_cutoff: 3.0      # g/cm³ upper bound on relaxed density; null disables
  # Deduplication
  assign_groups: true          # run dedup blocker + assign group_index. Default false
  remove_duplicates: true      # drop all-but-one per group (representative = lowest
                               # energy_relaxed_per_molecule). Default false
  # StructureMatcher tolerances (tighter than pre-relax)
  ltol: 0.2                    # default 0.2
  stol: 0.3                    # default 0.3
  angle_tol: 5                 # default 5
  # Bin key extensions
  bin_by_conf: false           # add conf_id to the dedup bin key
  bin_by_z: false              # add Z to the dedup bin key. When true, the dedup
                               # internally also disables sm.scale and sm.primitive_cell
                               # (small speedup; correct because Z fixes atom count
                               # and relaxed volumes are physically meaningful)
  bin_by_spg: false            # add spg_generated to the dedup bin key
  density_bin_size: 0.1        # g/cc; relaxation tightens density into basins,
                               # so a coarser bin than pre-relax is safe. null disables
  energy_bin_size: 2           # kJ/mol; ~thermal scale, captures within-basin spread.
                               # null disables
  # Cheap pairwise prefilters
  density_tol: null            # |Δρ| prefilter (g/cc); null disables
  energy_tol: null             # |ΔE| prefilter (kJ/mol); null disables. Requires
                               # energy_col set internally (post-relax always has it)
  apply_niggli_filter: false   # Niggli (a,b,c,α,β,γ) prefilter; most reliable when
                               # both bin_by_z and bin_by_spg are true
  slurm:                       # (optional)
    job-name: filter_and_deduplicate_structures
    cpus_per_task: 80
    mem_gb: 400
    time: 1000

# ---------------------------------------------------------------------------
# Stage 5 (optional): Experimental structure evaluation
# ---------------------------------------------------------------------------
evaluate:
  # Source of experimental crystals (use one of the two)
  target_xtals_dir: /path/to/experimental/crystal/structures # global dir of {refcode}.cif
  # Alternative: per-molecule cif_path column in molecules.csv
  #   - single refcode: cif_path -> a .cif file or a dir containing {refcode}.cif
  #   - comma-separated refcodes: cif_path -> a dir containing {refcode}.cif files
  method: csd                  # "csd" or "pymatgen"
  csd:
    num_cpus: 60                                       # parallel workers
    python_cmd: /path/to/python/with/csd/api/installed # interpreter with CSD API
    target_rows_per_chunk: 200                         # rows per CCDC subprocess chunk. Default 200
    chunk_timeout: 3600                                # per-chunk timeout (sec). Default 3600
  pymatgen:
    match_params:              # forwarded to pymatgen StructureMatcher
      ltol: 0.2
      stol: 0.3
      angle_tol: 5
    slurm:
      job-name: eval_pymatgen  # default "eval"
      cpus_per_task: 1         # default 1
      mem_gb: 10               # default 10
      time: 1000               # default 1000

# ---------------------------------------------------------------------------
# Stage 6 (optional, in development): Vibrational free energy corrections
# ---------------------------------------------------------------------------
# Enabled by adding ``compute_free_energy`` to ``--stages``. Reads the
# matched parquet from the evaluate stage (``relax/.../matched_structures/``)
# and writes per-structure thermo to ``relax/.../free_energy/``.
free_energy:
  calculator: uma_sm_1p1_omc   # UMA calculator key (must match a CHECKPOINTS entry
                               # in relax.py). Default uma_sm_1p1_omc.
  quasiharmonic: true          # quasi-harmonic approximation (volume sweep). Default true
  atom_disp: 0.01              # finite-difference displacement (Å). Default 0.01
  min_lengths: 15.0            # minimum supercell side length (Å) for phonon calc. Default 15.0
  # Temperature grid for thermo properties (K)
  t_min: 0                     # default 0
  t_max: 500                   # default 500
  t_step: 10                   # default 10
  # Workload selection / batching
  match_only: true             # only structures matched to experiment by ``evaluate``.
                               # Default true. Set false to run on all filtered structures.
  energy_cutoff: null          # kJ/mol above the global minimum; null = no cutoff
  max_structures: null         # cap on structures per molecule; null = no cap
  structures_per_job: 10       # rows per SLURM task. Default 10
  compute_dos: false           # also compute phonon density of states. Default false
  slurm:
    job-name: free_energy      # default "free_energy"
    gpus_per_node: 1           # default 1
    cpus_per_task: 10          # default 10
    mem_gb: 50                 # default 50
    time: 2000                 # default 2000

# ---------------------------------------------------------------------------
# (Optional) Logging configuration
# ---------------------------------------------------------------------------
logging:
  level: INFO                  # DEBUG, INFO, WARNING, ERROR
  console: true                # mirror to stdout in addition to FastCSP.log
