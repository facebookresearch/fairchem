# GP correctness test: compares single-GPU reference against
# all-gather, A2A-spatial, and A2A-index_split modes.
#
# Usage:
#   fairchem -c configs/uma/correctness/gp-correctness.yaml              # 1 GPU
#   fairchem -c configs/uma/correctness/gp-correctness.yaml job=local_8gpu  # 8 GPUs

defaults:
  - job: local
  - _self_

uma_s_1p2:
  _target_: fairchem.core.calculate.pretrained_mlip.pretrained_checkpoint_path_from_name
  model_name: "uma-s-1p2"

runner:
  _target_: fairchem.core.components.benchmark._single.gp_correctness.GPCorrectnessRunner
  model_checkpoint: ${uma_s_1p2}
  device: "cuda"
  natoms_list: [10, 50, 100]
  seed: 42
  inference_settings:
    _target_: fairchem.core.units.mlip_unit.api.inference.InferenceSettings
    tf32: False
    activation_checkpointing: False
    merge_mole: True
    compile: False
    external_graph_gen: False
    internal_graph_gen_version: 2
